name: rust-setup
description: >
  Install the Rust toolchain and restore caches, configured identically across CI and release
  (Law 8). Also caches the prebuilt ONNX Runtime that `ort` downloads at build time (the one heavy
  upstream — tens of MB, so GitHub Actions cache rather than S3; a named budget exception to Law 5).

inputs:
  components:
    description: "Extra rustup components, space-separated (e.g. 'clippy rustfmt')."
    required: false
    default: ""
  cache-key:
    description: >
      Stable cache segment, passed to rust-cache as `shared-key` (NOT `key`). rust-cache's default
      key includes ${{ github.job }}; using shared-key drops the job-name segment so any job with the
      same value restores the same cache — that's how the warm-cache job on main and the release
      `build` job share one `rel-<target>` cache. Use the same value everywhere they should collide.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Toolchain
      shell: bash
      run: |
        rustup show active-toolchain >/dev/null 2>&1 || rustup toolchain install stable --profile minimal
        if [ -n "${{ inputs.components }}" ]; then rustup component add ${{ inputs.components }}; fi
        rustc -V && cargo -V

    - name: Rust cache (registry + target)
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        # shared-key (not key): rust-cache's auto key embeds ${{ github.job }}, so a warm-cache job
        # and the release `build` job would never share. shared-key keys purely on this value, so the
        # main-seeded `rel-<target>` cache is restorable by the tag build (GitHub scope: current ref +
        # default branch). One-time cost: existing job-segmented caches go cold once on this change.
        shared-key: ${{ inputs.cache-key }}

    - name: Cache ONNX Runtime prebuilt (ort)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/Library/Caches/ort.pyke.io
          ~/.cache/ort.pyke.io
        # ort pins its prebuilt to its own version; key on the Cargo.lock entry so a bump busts it.
        key: ort-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          ort-${{ runner.os }}-${{ runner.arch }}-
